<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Helper Dashboard | EldercareHub</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <style>
    body {
      background: #f8f9fa;
      font-family: 'Poppins', sans-serif;
    }
    .navbar {
      background: #fff;
    }
    .navbar-brand {
      font-weight: bold;
      color: #007bff !important;
    }
    .card {
      border-radius: 15px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }
    #helperImagePreview {
      transition: transform 0.3s ease;
    }
    #helperImagePreview:hover {
      transform: scale(1.05);
    }
    .btn-primary {
      background: #007bff;
      border: none;
      transition: 0.3s;
    }
    .btn-primary:hover {
      background: #00b8a9;
      transform: scale(1.05);
    }
    textarea {
      resize: none;
    }
  </style>
</head>

<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container">
      <a href="index.html" class="navbar-brand fs-4">🌼 EldercareHub</a>
      <button id="logoutBtn" class="btn btn-outline-danger btn-sm"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>
  </nav>

  <!-- Main -->
  <main class="container py-4 animate__animated animate__fadeInUp">
    <div class="row">
      <!-- Profile Section -->
      <div class="col-md-5 mb-3">
        <div class="card p-3">
          <h5 class="mb-3 text-primary">👤 My Profile</h5>

          <div class="text-center mb-3">
            <img id="helperImagePreview" src="https://www.svgrepo.com/show/500615/profile-avatar.svg"
              class="rounded-circle shadow-sm" width="120" height="120" alt="Profile Picture">
            <input type="file" id="helperImage" class="form-control mt-2" accept="image/*">
          </div>

          <input class="form-control mb-2" id="helperName" placeholder="Full Name">
          
          <select id="helperService" class="form-select mb-2">
            <option value="">Select Service Type</option>
            <option>Cleaning</option>
            <option>Grocery</option>
            <option>Laundry</option>
            <option>Personal Care</option>
            <option>Companionship</option>
            <option>Other</option>
          </select>

          <input class="form-control mb-2" id="helperRate" type="number" placeholder="Rate per hour (₹)">
          <input class="form-control mb-2" id="helperAddress" placeholder="Full Address (Area, City)">
          <textarea class="form-control mb-3" id="helperBio" placeholder="Short bio (max 150 characters)" maxlength="150"></textarea>

          <button class="btn btn-primary w-100" id="saveProfileBtn"><i class="bi bi-save"></i> Save Profile</button>
        </div>
      </div>

      <!-- Right Column -->
      <div class="col-md-7">
        <div class="card p-3 shadow-sm mb-3">
          <h5 class="text-primary">📅 My Bookings</h5>
          <div id="bookingsList">
            <p class="text-muted">No bookings yet.</p>
          </div>
        </div>

        <div class="card p-3 shadow-sm">
          <h5 class="text-primary">⭐ My Reviews</h5>
          <div id="reviewsList">
            <p class="text-muted">No reviews yet.</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script>
    const imgInput = document.getElementById("helperImage");
    const imgPreview = document.getElementById("helperImagePreview");
    const saveBtn = document.getElementById("saveProfileBtn");

    // 🖼️ Preview uploaded image instantly
    imgInput.addEventListener("change", () => {
      const file = imgInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        imgPreview.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    // 🧠 Save Helper Profile to localStorage
    saveBtn.addEventListener("click", () => {
      const name = document.getElementById("helperName").value.trim();
      const service = document.getElementById("helperService").value;
      const rate = document.getElementById("helperRate").value.trim();
      const address = document.getElementById("helperAddress").value.trim();
      const bio = document.getElementById("helperBio").value.trim();
      const imageSrc = imgPreview.src;

      if (!name || !service || !rate || !address || !bio) {
        Swal.fire("⚠️ Missing Information", "Please fill all profile fields.", "warning");
        return;
      }

      if (bio.length > 150) {
        Swal.fire("✍️ Bio Too Long", "Bio should be under 150 characters.", "error");
        return;
      }

      const helperProfile = {
        name,
        service,
        rate: Number(rate),
        address,
        bio,
        imageSrc,
        rating: (4.5 + Math.random() * 0.5).toFixed(1) // random realistic rating
      };

      // Save in localStorage (simulating database)
      localStorage.setItem("helperProfile", JSON.stringify(helperProfile));

      Swal.fire("✅ Profile Saved!", "Your information has been updated successfully.", "success");
    });

    // 🏠 Logout
    document.getElementById("logoutBtn").addEventListener("click", () => {
      Swal.fire({
        title: "Logout Confirmation",
        text: "Are you sure you want to logout?",
        icon: "warning",
        showCancelButton: true,
        confirmButtonText: "Logout",
        cancelButtonText: "Cancel"
      }).then(result => {
        if (result.isConfirmed) {
          Swal.fire("👋 Logged Out!", "See you again!", "success");
          setTimeout(() => {
            window.location.href = "login.html";
          }, 2000);
        }
      });
    });

    // 🧩 Load saved profile when helper logs in again
    window.onload = () => {
      const saved = localStorage.getItem("helperProfile");
      if (saved) {
        const h = JSON.parse(saved);
        document.getElementById("helperName").value = h.name;
        document.getElementById("helperService").value = h.service;
        document.getElementById("helperRate").value = h.rate;
        document.getElementById("helperAddress").value = h.address;
        document.getElementById("helperBio").value = h.bio;
        document.getElementById("helperImagePreview").src = h.imageSrc;
      }
    };
  </script>
</body>
</html>
