<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Bookings | EldercareHub</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body { background: #f8f9fa; font-family: 'Poppins', sans-serif; }
    .navbar { background: #fff; box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1); }
    .navbar-brand { color: #007bff !important; font-weight: 600; }
    .booking-card {
      background: white; border-radius: 15px; padding: 15px;
      transition: 0.3s ease; box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }
    .booking-card:hover { transform: translateY(-5px); box-shadow: 0 4px 15px rgba(0, 123, 255, 0.2); }
    .badge { padding: 6px 10px; border-radius: 10px; font-size: 0.8rem; font-weight: 500; }
    .badge-pending { background: #ffc107; color: #000; }
    .badge-completed { background: #28a745; color: #fff; }
    .badge-cancelled { background: #dc3545; color: #fff; }
    .btn-action { font-size: 0.8rem; padding: 5px 10px; margin-left: 5px; }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-light">
    <div class="container">
      <a href="user_dashboard.html" class="navbar-brand fs-4">🌼 EldercareHub</a>
      <button id="logoutBtn" class="btn btn-outline-danger btn-sm"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>
  </nav>

  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3 class="text-primary mb-0">📅 My Bookings</h3>
      <select id="filterSelect" class="form-select w-auto">
        <option value="all">All</option>
        <option value="Pending">Pending</option>
        <option value="Completed">Completed</option>
        <option value="Cancelled">Cancelled</option>
      </select>
    </div>

    <div id="bookingsList" class="row g-3"></div>
  </main>

  <!-- Review Modal -->
  <div class="modal fade" id="reviewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title">Rate Helper</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="fw-semibold mb-2" id="reviewHelperName"></div>
          <label>Rating (1–5)</label>
          <input type="number" id="reviewRating" min="1" max="5" class="form-control mb-2">
          <label>Comment</label>
          <textarea id="reviewComment" class="form-control" rows="3" placeholder="Write your feedback..."></textarea>
          <div id="reviewAlert" class="alert d-none mt-2"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary" id="submitReviewBtn">Submit</button>
          <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  document.addEventListener("DOMContentLoaded", () => {
    const bookingsList = document.getElementById("bookingsList");
    const filterSelect = document.getElementById("filterSelect");
    let reviews = JSON.parse(localStorage.getItem("reviews")) || [];

    let bookings = JSON.parse(localStorage.getItem("myBookings")) || [];

    // 🧩 Render bookings
    function renderBookings(filter = "all") {
      bookingsList.innerHTML = "";
      const filtered = filter === "all" ? bookings : bookings.filter(b => b.status === filter);
      if (filtered.length === 0) {
        bookingsList.innerHTML = `<p class="text-center text-muted mt-4">No bookings found 💤</p>`;
        return;
      }

      filtered.sort((a,b) => new Date(a.date) - new Date(b.date));

      filtered.forEach(b => {
        bookingsList.innerHTML += `
          <div class="col-md-6">
            <div class="booking-card">
              <div class="d-flex align-items-center">
                <img src="${b.image}" class="rounded-circle me-3" width="70" height="70">
                <div>
                  <h6 class="mb-1">${b.helperName}</h6>
                  <p class="mb-0 small text-muted">${b.service}</p>
                  <span class="badge ${b.status === "Completed" ? "badge-completed" : b.status === "Pending" ? "badge-pending" : "badge-cancelled"}">${b.status}</span>
                </div>
              </div>
              <hr>
              <p class="mb-1"><b>Date:</b> ${b.date}</p>
              <p class="mb-1"><b>Duration:</b> ${b.hours} hr</p>
              <p class="mb-1"><b>Total:</b> ₹${b.total}</p>
              <div class="text-end mt-3">
                ${b.status === "Pending" ?
                  `<button class="btn btn-sm btn-success btn-action" onclick="markCompleted(${b.id})">Mark Completed</button>
                   <button class="btn btn-sm btn-danger btn-action" onclick="cancelBooking(${b.id})">Cancel</button>` :
                  b.status === "Completed" ?
                  `<button class="btn btn-sm btn-primary btn-action" onclick="openReviewModal('${b.helperName}')">Rate</button>` : ''
                }
              </div>
            </div>
          </div>`;
      });
    }

    renderBookings();

    // 🧩 Filter dropdown
    filterSelect.addEventListener("change", e => renderBookings(e.target.value));

    // 🧩 Status actions
    window.markCompleted = id => {
      const b = bookings.find(x => x.id === id);
      b.status = "Completed";
      saveBookings();
      Swal.fire("✅ Marked as Completed", "", "success");
      renderBookings(filterSelect.value);
    };

    window.cancelBooking = id => {
      Swal.fire({
        title: "Cancel Booking?",
        icon: "warning",
        showCancelButton: true,
        confirmButtonText: "Yes, Cancel"
      }).then(res => {
        if (res.isConfirmed) {
          bookings = bookings.filter(x => x.id !== id);
          saveBookings();
          Swal.fire("🗑️ Booking Cancelled", "", "success");
          renderBookings(filterSelect.value);
        }
      });
    };

    function saveBookings() {
      localStorage.setItem("myBookings", JSON.stringify(bookings));
    }

    // 🧩 Review Modal
    window.openReviewModal = helperName => {
      document.getElementById("reviewHelperName").innerText = helperName;
      document.getElementById("reviewRating").value = "";
      document.getElementById("reviewComment").value = "";
      document.getElementById("reviewAlert").classList.add("d-none");
      new bootstrap.Modal(document.getElementById("reviewModal")).show();
    };

    document.getElementById("submitReviewBtn").addEventListener("click", () => {
      const name = document.getElementById("reviewHelperName").innerText;
      const rating = parseInt(document.getElementById("reviewRating").value);
      const comment = document.getElementById("reviewComment").value.trim();

      if (!rating || rating < 1 || rating > 5) return showReviewAlert("⚠️ Please rate between 1–5.", "danger");
      if (!comment) return showReviewAlert("✍️ Please write a short comment.", "danger");

      reviews.push({ helperName: name, rating, comment, date: new Date().toLocaleString() });
      localStorage.setItem("reviews", JSON.stringify(reviews));

      showReviewAlert("🎉 Review submitted successfully!", "success");
      setTimeout(() => bootstrap.Modal.getInstance(document.getElementById("reviewModal")).hide(), 1000);
    });

    function showReviewAlert(msg, type) {
      const alertBox = document.getElementById("reviewAlert");
      alertBox.className = `alert alert-${type}`;
      alertBox.textContent = msg;
      alertBox.classList.remove("d-none");
    }

    // 🚪 Logout
    document.getElementById("logoutBtn").addEventListener("click", () => {
      Swal.fire({
        title: "Logout?",
        icon: "warning",
        showCancelButton: true,
        confirmButtonText: "Logout"
      }).then(res => {
        if (res.isConfirmed) {
          Swal.fire("👋 Logged Out!", "", "success");
          setTimeout(() => window.location.href = "login.html", 1500);
        }
      });
    });
  });
  </script>
</body>
</html>
