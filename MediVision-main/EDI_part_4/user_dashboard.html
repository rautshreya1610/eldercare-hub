<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Dashboard | EldercareHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body {
      background: #f8f9fa;
      font-family: 'Poppins', sans-serif;
    }
    .navbar { background: #fff; }
    .navbar-brand { font-weight: 600; color: #007bff !important; }
    .card {
      border-radius: 15px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }
    .card:hover { transform: translateY(-5px); }
    .price-tag { font-weight: bold; color: #00b894; }
    .book-btn {
      background: #007bff; border: none; transition: 0.3s ease;
    }
    .book-btn:hover { background: #00b8a9; transform: scale(1.05); }
    .nav-link.active {
      font-weight: 600; border-bottom: 3px solid #007bff; color: #007bff !important;
    }
  </style>
</head>

<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container">
      <a href="index.html" class="navbar-brand fs-4">🌼 EldercareHub</a>
      <div>
        <a href="my_bookings.html" class="btn btn-outline-primary btn-sm me-2">
          <i class="bi bi-calendar-check"></i> My Bookings
        </a>
        <button id="logoutBtn" class="btn btn-outline-danger btn-sm">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="container py-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3 class="mb-0">Available Helpers 🤝</h3>
      <input id="searchInput" class="form-control w-50" placeholder="🔍 Search by name or address">
    </div>

    <!-- Service Tabs -->
    <ul class="nav nav-tabs mb-4" id="serviceTabs">
      <li class="nav-item"><a class="nav-link active" data-service="all">All</a></li>
      <li class="nav-item"><a class="nav-link" data-service="Cleaning">Cleaning</a></li>
      <li class="nav-item"><a class="nav-link" data-service="Grocery">Grocery</a></li>
      <li class="nav-item"><a class="nav-link" data-service="Laundry">Laundry</a></li>
      <li class="nav-item"><a class="nav-link" data-service="Personal Care">Personal Care</a></li>
      <li class="nav-item"><a class="nav-link" data-service="Companionship">Companionship</a></li>
      <li class="nav-item"><a class="nav-link" data-service="Other">Other</a></li>
    </ul>

    <!-- Helpers List -->
    <div id="helpersRow" class="row g-4"></div>
  </main>

  <!-- JS -->
  <script>
    // Default helper data
    let helpers = [
      { name: "Rohan Mehta", service: "Cleaning", address: "Pune, Maharashtra", price: 250, rating: 4.7, img: "https://cdn-icons-png.flaticon.com/512/2922/2922561.png" },
      { name: "Anita Sharma", service: "Grocery", address: "Mumbai, Maharashtra", price: 200, rating: 4.9, img: "https://cdn-icons-png.flaticon.com/512/706/706830.png" },
      { name: "Sunil Rao", service: "Laundry", address: "Nagpur, Maharashtra", price: 180, rating: 4.5, img: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png" },
      { name: "Kavita Patil", service: "Personal Care", address: "Nashik, Maharashtra", price: 300, rating: 4.8, img: "https://cdn-icons-png.flaticon.com/512/4140/4140048.png" },
      { name: "Rajesh Kulkarni", service: "Companionship", address: "Kolhapur, Maharashtra", price: 220, rating: 4.6, img: "https://cdn-icons-png.flaticon.com/512/2922/2922506.png" },
      { name: "Sneha Joshi", service: "Other", address: "Pimpri, Maharashtra", price: 150, rating: 4.4, img: "https://cdn-icons-png.flaticon.com/512/4140/4140047.png" }
    ];

    // Load helper profile (uploaded by helper)
    const savedHelper = localStorage.getItem("helperProfile");
    if (savedHelper) {
      const h = JSON.parse(savedHelper);
      helpers.unshift({
        name: h.name,
        service: h.service,
        address: h.address,
        price: h.rate,
        rating: h.rating || 4.9,
        img: h.imageSrc || "https://cdn-icons-png.flaticon.com/512/847/847969.png"
      });
    }

    const helpersRow = document.getElementById("helpersRow");
    const searchInput = document.getElementById("searchInput");
    const tabs = document.querySelectorAll("#serviceTabs .nav-link");

    // Render Helper Cards
    function renderHelpers(data) {
      helpersRow.innerHTML = "";
      if (data.length === 0) {
        helpersRow.innerHTML = `<p class="text-center text-muted">No helpers found 🥺</p>`;
        return;
      }

      data.forEach(helper => {
        helpersRow.innerHTML += `
          <div class="col-md-4 col-lg-3">
            <div class="card text-center p-3">
              <img src="${helper.img}" alt="helper" class="mx-auto rounded-circle" width="90" height="90">
              <h5 class="mt-3 mb-1">${helper.name}</h5>
              <p class="text-muted mb-1">${helper.service}</p>
              <p class="small"><i class="bi bi-geo-alt"></i> ${helper.address}</p>
              <p class="price-tag">₹${helper.price} / service</p>
              <p>⭐ ${helper.rating}</p>
              <button class="btn btn-primary book-btn w-100" data-name="${helper.name}" data-service="${helper.service}" data-price="${helper.price}" data-img="${helper.img}">
                Book Now
              </button>
            </div>
          </div>
        `;
      });

      addBookingListeners();
    }

    // Booking Functionality (connected to My Bookings)
    function addBookingListeners() {
      document.querySelectorAll(".book-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const helperName = btn.dataset.name;
          const service = btn.dataset.service;
          const price = btn.dataset.price;
          const image = btn.dataset.img;

          Swal.fire({
            title: "Confirm Booking?",
            html: `
              <b>Helper:</b> ${helperName}<br>
              <b>Service:</b> ${service}<br>
              <b>Price:</b> ₹${price}
            `,
            icon: "question",
            showCancelButton: true,
            confirmButtonText: "Yes, Book Now"
          }).then(result => {
            if (result.isConfirmed) {
              const newBooking = {
                id: Date.now(),
                helperName,
                service,
                date: new Date().toLocaleString(),
                hours: 1,
                total: price,
                status: "Pending",
                image
              };

              let bookings = JSON.parse(localStorage.getItem("myBookings")) || [];
              bookings.push(newBooking);
              localStorage.setItem("myBookings", JSON.stringify(bookings));

              Swal.fire({
                title: "✅ Booked Successfully!",
                text: `${helperName} will contact you soon.`,
                icon: "success",
                confirmButtonText: "View My Bookings"
              }).then(() => {
                window.location.href = "my_bookings.html";
              });
            }
          });
        });
      });
    }

    // Search Filter
    searchInput.addEventListener("keyup", e => {
      const query = e.target.value.toLowerCase();
      const filtered = helpers.filter(h =>
        h.name.toLowerCase().includes(query) ||
        h.address.toLowerCase().includes(query)
      );
      renderHelpers(filtered);
    });

    // Tabs Filter
    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        const selected = tab.getAttribute("data-service");
        if (selected === "all") renderHelpers(helpers);
        else renderHelpers(helpers.filter(h => h.service === selected));
      });
    });

    // Logout
    document.getElementById("logoutBtn").addEventListener("click", () => {
      Swal.fire({
        title: "Logout?",
        icon: "warning",
        showCancelButton: true,
        confirmButtonText: "Logout"
      }).then(res => {
        if (res.isConfirmed) {
          Swal.fire("👋 Logged Out!", "", "success");
          setTimeout(() => (window.location.href = "login.html"), 1500);
        }
      });
    });

    // Initial Render
    renderHelpers(helpers);
  </script>
</body>
</html>
