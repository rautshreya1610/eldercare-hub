<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password | EldercareHub</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #007bff, #00b8a9);
      font-family: 'Poppins', sans-serif;
    }
    .navbar {
      background: #fff;
    }
    .navbar-brand {
      font-weight: bold;
      color: #007bff !important;
    }
    .card {
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    .btn-primary {
      background: #007bff;
      border: none;
      transition: 0.3s ease;
    }
    .btn-primary:hover {
      background: #00b8a9;
      transform: scale(1.05);
    }
    .back-link {
      text-decoration: none;
      color: #007bff;
      font-weight: 500;
    }
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
      <a href="index.html" class="navbar-brand fs-3">🌼 EldercareHub</a>
      <button class="btn btn-outline-primary" id="homeBtn"><i class="bi bi-house-door"></i> Home</button>
    </div>
  </nav>

  <!-- Forgot Password Form -->
  <section class="d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow-lg border-0 animate__animated animate__fadeInUp" style="max-width: 420px; width: 100%;">
      <h2 class="text-center text-primary mb-3">Forgot Password? 🔐</h2>
      <p class="text-center text-muted mb-4">No worries — we’ll send you a link to reset your password.</p>

      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="Enter your registered email">
      </div>

      <button id="resetBtn" class="btn btn-primary w-100 py-2 mt-2">Send Reset Link</button>

      <p class="text-center mt-4 mb-0">
        <a href="login.html" class="back-link"><i class="bi bi-arrow-left"></i> Back to Login</a>
      </p>
    </div>
  </section>

  <!-- JS Logic -->
  <script>
    // 🏠 Home Button
    document.getElementById("homeBtn").addEventListener("click", () => {
      window.location.href = "index.html";
    });

    // ✉️ Reset Password Logic
    document.getElementById("resetBtn").addEventListener("click", () => {
      const email = document.getElementById("email").value.trim();
      const emailRegex = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/;

      if (!email) {
        Swal.fire("⚠️ Missing Email", "Please enter your registered email address.", "warning");
        return;
      }
      if (!emailRegex.test(email)) {
        Swal.fire("📧 Invalid Email", "Please enter a valid email address.", "error");
        return;
      }

      Swal.fire({
        icon: "success",
        title: "📩 Reset Link Sent!",
        text: "A password reset link has been sent to " + email + ".",
        timer: 3000,
        showConfirmButton: false
      });

      setTimeout(() => {
        window.location.href = "login.html";
      }, 3000);
    });
  </script>

</body>
</html>
