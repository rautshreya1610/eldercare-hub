<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up | EldercareHub</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #007bff, #00b8a9);
      font-family: 'Poppins', sans-serif;
    }
    .navbar {
      background: #fff;
    }
    .navbar-brand {
      font-weight: bold;
      color: #007bff !important;
    }
    .card {
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    }
    .btn-primary {
      background: #007bff;
      border: none;
      transition: 0.3s ease;
    }
    .btn-primary:hover {
      background: #00b8a9;
      transform: scale(1.05);
    }
    #togglePassword {
      cursor: pointer;
      position: absolute;
      right: 15px;
      top: 38px;
    }
    .strength {
      height: 6px;
      border-radius: 5px;
      background: #ddd;
      margin-top: 3px;
      transition: width 0.3s ease;
    }
    .strength.weak { background: red; width: 33%; }
    .strength.medium { background: orange; width: 66%; }
    .strength.strong { background: green; width: 100%; }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-light shadow-sm">
    <div class="container">
      <a href="index.html" class="navbar-brand fs-3">🌼 EldercareHub</a>
      <button class="btn btn-outline-primary" id="goHomeBtn"><i class="bi bi-house-door"></i> Home</button>
    </div>
  </nav>

  <!-- Signup Form -->
  <section class="d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow-lg border-0 animate__animated animate__fadeInUp" style="max-width: 420px; width: 100%;">
      <h2 class="text-center text-primary mb-3">Create Account 📝</h2>
      <p class="text-center text-muted mb-4">Join our caring community today 💙</p>

      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" id="name" class="form-control" placeholder="Enter your full name">
      </div>

      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="Enter your email">
      </div>

      <div class="mb-3 position-relative">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Create a password">
        <i class="bi bi-eye-slash" id="togglePassword"></i>
        <div id="strengthBar" class="strength"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">Select Role</label>
        <select id="role" class="form-select">
          <option value="">-- Select Role --</option>
          <option value="elder">👵 Elder / User</option>
          <option value="helper">🤝 Helper</option>
        </select>
      </div>

      <button id="signupBtn" class="btn btn-primary w-100 py-2 mt-2">
        <i class="bi bi-person-plus-fill"></i> Sign Up
      </button>

      <p class="text-center mt-3 mb-0">
        Already have an account? 
        <a href="login.html" class="text-decoration-none text-primary">Login here</a>
      </p>
    </div>
  </section>

  <!-- Script Section -->
  <script>
    // 👁️ Password Show/Hide Toggle
    const passwordField = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');
    togglePassword.addEventListener('click', () => {
      const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordField.setAttribute('type', type);
      togglePassword.classList.toggle('bi-eye');
    });

    // 💪 Password Strength Meter
    const strengthBar = document.getElementById('strengthBar');
    passwordField.addEventListener('input', () => {
      const val = passwordField.value;
      if (val.length === 0) {
        strengthBar.className = 'strength';
      } else if (val.length < 6) {
        strengthBar.className = 'strength weak';
      } else if (val.match(/[A-Z]/) && val.match(/[0-9]/) && val.match(/[@$!%*?&#]/)) {
        strengthBar.className = 'strength strong';
      } else {
        strengthBar.className = 'strength medium';
      }
    });

    // 🏠 Home Button
    document.getElementById("goHomeBtn").addEventListener("click", () => {
      window.location.href = "index.html";
    });

    // VALIDATION REGEX
    const nameRegex = /^[A-Za-z ]{3,}$/;
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const passwordRegex = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&#]).{6,}$/;

    // 🧾 Sign Up Button Logic
    document.getElementById("signupBtn").addEventListener("click", () => {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const role = document.getElementById("role").value;

      // Name Validation
      if (!nameRegex.test(name)) {
        Swal.fire("❌ Invalid Name", "Name must contain only letters and be at least 3 characters.", "error");
        return;
      }

      // Email Validation
      if (!emailRegex.test(email)) {
        Swal.fire("❌ Invalid Email", "Please enter a valid email address.", "error");
        return;
      }

      // Password Validation
      if (!passwordRegex.test(password)) {
        Swal.fire("🔒 Weak Password", 
          "Password must contain:<br>✔ At least 6 characters<br>✔ 1 uppercase letter<br>✔ 1 number<br>✔ 1 special character", 
          "error"
        );
        return;
      }

      // Role Validation
      if (!role) {
        Swal.fire("⚠️ Select Role", "Please choose a role (Elder / Helper).", "warning");
        return;
      }

      // SUCCESS
      Swal.fire({
        title: "🎉 Account Created Successfully!",
        text: "Welcome " + name + " — role: " + (role === "elder" ? "Elder/User" : "Helper"),
        icon: "success",
        showConfirmButton: false,
        timer: 2500
      });

      setTimeout(() => {
        window.location.href = "login.html";
      }, 2500);
    });
  </script>
</body>
</html>
